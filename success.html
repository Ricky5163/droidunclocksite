<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droidunclock | Payment Received</title>
  <meta name="description" content="Droidunclock payment confirmation." />
  <meta name="theme-color" content="#09111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css?v=lang2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="result-page">
  <main class="result-card glass-card">
    <select class="language-select" data-language-select aria-label="Language">
      <option value="en">EN</option><option value="pt">PT</option><option value="nl">NL</option>
      <option value="es">ES</option><option value="fr">FR</option><option value="de">DE</option>
    </select>
    <span class="eyebrow" data-i18n="paymentReceived">Payment received</span>
    <h1 id="msg" data-i18n="processingConfirmation">Processing confirmation...</h1>
    <p id="detail" class="muted" data-i18n="validatingPayment">We are validating the payment gateway return.</p>
    <div class="result-actions">
      <a class="btn btn--primary" href="shop.html" data-i18n="backToShop">Back to shop</a>
      <a class="btn btn--ghost" href="index.html" data-i18n="homepage">Homepage</a>
    </div>
  </main>

  <script type="module" src="js/success.js?v=auth8"></script>
  <script type="module" src="js/support-chat.js?v=chat1"></script>
</body>
</html>
