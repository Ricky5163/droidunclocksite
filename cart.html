<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droidunclock | Cart</title>
  <meta name="description" content="Review your Droidunclock cart with subtotal, shipping, and secure checkout." />
  <meta name="theme-color" content="#050608" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=lang1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <header class="site-header">
    <div class="container header-bar">
      <a class="brand" href="shop.html">
        <img src="assets/img_2.jpg" alt="Droidunclock" class="brand__logo" />
        <div><strong>Droidunclock</strong><span data-i18n="cartTitle">Shopping cart</span></div>
      </a>
      <nav class="desktop-nav">
        <a href="shop.html" data-i18n="navShop">Shop</a>
        <select class="language-select" data-language-select aria-label="Language">
          <option value="en">EN</option><option value="pt">PT</option><option value="nl">NL</option>
          <option value="es">ES</option><option value="fr">FR</option><option value="de">DE</option>
        </select>
      </nav>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="container checkout-layout">
      <section class="glass-card">
        <div class="section-head section-head--compact">
          <span class="eyebrow" data-i18n="cartTitle">Shopping cart</span>
          <h1 data-i18n="reviewCartTitle">Review your items before secure checkout.</h1>
        </div>
        <p id="status" class="status-text" aria-live="polite"></p>
        <section id="cartList" class="cart-list"></section>
      </section>

      <aside class="glass-card summary-card">
        <span class="eyebrow" data-i18n="summary">Summary</span>
        <div class="summary-card__row"><span data-i18n="subtotal">Subtotal</span><strong id="subtotal">€0.00</strong></div>
        <div class="summary-card__row"><span data-i18n="shipping">Shipping</span><strong id="shipping">€0.00</strong></div>
        <div class="summary-card__row summary-card__total-row"><span data-i18n="total">Total</span><strong id="total">€0.00</strong></div>
        <p class="summary-card__meta" id="summaryCount">0 items</p>
        <a class="btn btn--primary btn--block" href="checkout.html" id="goCheckout" data-i18n="checkout">Checkout</a>
      </aside>
    </div>
  </main>

  <script type="module" src="js/cart.js?v=lang1"></script>
</body>
</html>
