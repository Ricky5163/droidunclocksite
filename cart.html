<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droidunclock | Carrinho</title>
  <meta name="description" content="Carrinho Droidunclock sincronizado com stock real antes do checkout." />
  <meta name="theme-color" content="#09111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <header class="dashboard-header">
    <div class="container dashboard-header__bar">
      <a class="brand" href="shop.html">
        <img src="assets/img_2.jpg" alt="Droidunclock" class="brand__logo" />
        <div>
          <strong>Droidunclock</strong>
          <span>Carrinho</span>
        </div>
      </a>

      <div class="header-actions">
        <a class="btn btn--ghost btn--small" href="shop.html">Continuar a comprar</a>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="container checkout-layout">
      <section class="glass-card">
        <div class="section-head section-head--compact">
          <span class="eyebrow">Carrinho sincronizado</span>
          <h1>Revista os itens antes de pagar.</h1>
        </div>

        <p id="status" class="status-text" aria-live="polite"></p>
        <section id="cartList" class="cart-list"></section>
      </section>

      <aside class="glass-card summary-card">
        <span class="eyebrow">Resumo</span>
        <h2>Total atual</h2>
        <p class="summary-card__meta" id="summaryCount">0 items</p>
        <strong class="summary-card__total" id="total">0,00 €</strong>
        <a class="btn btn--primary btn--block" href="checkout.html" id="goCheckout">Ir para checkout</a>
        <p class="muted">
          Antes do pagamento, o sistema volta a validar stock e preco dos produtos.
        </p>
      </aside>
    </div>
  </main>

  <script type="module" src="js/cart.js"></script>
</body>
</html>
