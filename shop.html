<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droidunclock | Loja de Telemoveis</title>
  <meta name="description" content="Loja online Droidunclock com telemoveis disponiveis, stock real e carrinho sincronizado." />
  <meta name="theme-color" content="#09111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <header class="dashboard-header">
    <div class="container dashboard-header__bar">
      <a class="brand" href="index.html">
        <img src="assets/img_2.jpg" alt="Droidunclock" class="brand__logo" />
        <div>
          <strong>Droidunclock</strong>
          <span>Telemoveis online</span>
        </div>
      </a>

      <div class="header-actions">
        <a class="btn btn--ghost btn--small" data-cart-count href="cart.html">Carrinho (0)</a>
        <button class="btn btn--ghost btn--small" id="logoutBtn" type="button">Terminar sessao</button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="container">
      <section class="dashboard-hero glass-card">
        <div>
          <span class="eyebrow">Catalogo online</span>
          <h1>Telemoveis disponiveis com carrinho e checkout seguro.</h1>
          <p class="muted">
            Esta montra esta focada apenas na revenda de telemoveis, com stock validado antes do pagamento.
          </p>
        </div>
      </section>

      <section class="filter-panel glass-card">
        <div class="filter-panel__copy">
          <span class="eyebrow">Telemoveis</span>
          <h2>Pesquisa o modelo que procuras</h2>
        </div>

        <div class="filter-grid filter-grid--single">
          <label>
            Pesquisar
            <input id="search" class="input" placeholder="Ex.: iPhone 13, Samsung A54, Xiaomi 12" />
          </label>
        </div>
      </section>

      <p id="status" class="status-text" aria-live="polite"></p>
      <section id="grid" class="product-grid"></section>
    </div>
  </main>

  <script type="module" src="js/shop.js"></script>
</body>
</html>
