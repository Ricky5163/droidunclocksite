<!doctype html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Droidunclock | Loja Privada</title>
  <meta name="description" content="Loja privada Droidunclock com acesso autenticado, stock real e carrinho sincronizado." />
  <meta name="theme-color" content="#09111f" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dashboard-page">
  <header class="dashboard-header">
    <div class="container dashboard-header__bar">
      <a class="brand" href="index.html">
        <img src="assets/img_2.jpg" alt="Droidunclock" class="brand__logo" />
        <div>
          <strong>Droidunclock</strong>
          <span>Loja privada</span>
        </div>
      </a>

      <div class="header-actions">
        <a class="btn btn--ghost btn--small" data-cart-count href="cart.html">Carrinho (0)</a>
        <button class="btn btn--ghost btn--small" id="logoutBtn" type="button">Terminar sessao</button>
      </div>
    </div>
  </header>

  <main class="dashboard-main">
    <div class="container">
      <section class="dashboard-hero glass-card">
        <div>
          <span class="eyebrow">Area autenticada</span>
          <h1>Produtos, recondicionados e servicos com carrinho seguro.</h1>
          <p class="muted">
            O catalogo continua leve no frontend, mas o pagamento ja nao confia em preco nem stock vindos do browser.
          </p>
        </div>
      </section>

      <section class="filter-panel glass-card">
        <div class="filter-panel__copy">
          <span class="eyebrow">Catalogo</span>
          <h2>Escolhe com mais contexto</h2>
        </div>

        <div class="filter-grid">
          <label>
            Pesquisar
            <input id="search" class="input" placeholder="Ex.: A34, bateria, iPhone, ecra" />
          </label>

          <label>
            Categoria
            <select id="category" class="input">
              <option value="">Todas as categorias</option>
              <option value="telemovel">Telemoveis</option>
              <option value="peca">Pecas</option>
              <option value="acessorio">Acessorios</option>
              <option value="servico">Servicos</option>
            </select>
          </label>
        </div>
      </section>

      <p id="status" class="status-text" aria-live="polite"></p>
      <section id="grid" class="product-grid"></section>
    </div>
  </main>

  <script type="module" src="js/shop.js"></script>
</body>
</html>
